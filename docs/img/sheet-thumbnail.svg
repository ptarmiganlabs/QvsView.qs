<svg xmlns="http://www.w3.org/2000/svg" width="410" height="270" viewBox="0 0 410 270">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5EBF8"/>
      <stop offset="100%" stop-color="#E0CAF0"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B35A0"/>
      <stop offset="100%" stop-color="#5B1A6E"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#7B2D8E" flood-opacity="0.18"/>
    </filter>
    <filter id="panelShadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#5B1A6E" flood-opacity="0.10"/>
    </filter>
    <clipPath id="bgClip">
      <rect x="0" y="0" width="410" height="270" rx="20" ry="20"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="410" height="270" rx="20" ry="20" fill="url(#bgGrad)"/>

  <!-- Subtle background decoration: faint large circle top-right -->
  <circle cx="360" cy="-20" r="120" fill="#C49DD8" opacity="0.13"/>
  <!-- Faint small circle bottom-left -->
  <circle cx="30" cy="250" r="70" fill="#A06BC0" opacity="0.10"/>

  <!-- Mock code panel (right side) -->
  <rect x="210" y="40" width="170" height="190" rx="10" ry="10"
        fill="url(#panelGrad)" filter="url(#panelShadow)"/>

  <!-- Code lines inside panel -->
  <!-- Line 1: keyword + space + identifier -->
  <rect x="224" y="62" width="28" height="7" rx="3.5" fill="#7B2D8E" opacity="0.70"/>
  <rect x="257" y="62" width="52" height="7" rx="3.5" fill="#9B4DB8" opacity="0.40"/>
  <!-- Line 2 -->
  <rect x="224" y="78" width="20" height="7" rx="3.5" fill="#7B2D8E" opacity="0.70"/>
  <rect x="249" y="78" width="70" height="7" rx="3.5" fill="#B57DD0" opacity="0.35"/>
  <!-- Line 3 indent -->
  <rect x="236" y="94" width="42" height="7" rx="3.5" fill="#9B4DB8" opacity="0.45"/>
  <rect x="283" y="94" width="30" height="7" rx="3.5" fill="#B57DD0" opacity="0.30"/>
  <!-- Line 4 indent -->
  <rect x="236" y="110" width="55" height="7" rx="3.5" fill="#7B2D8E" opacity="0.35"/>
  <!-- Line 5 -->
  <rect x="224" y="126" width="20" height="7" rx="3.5" fill="#7B2D8E" opacity="0.70"/>
  <rect x="249" y="126" width="38" height="7" rx="3.5" fill="#B57DD0" opacity="0.35"/>
  <rect x="292" y="126" width="22" height="7" rx="3.5" fill="#9B4DB8" opacity="0.40"/>
  <!-- Line 6 indent -->
  <rect x="236" y="142" width="48" height="7" rx="3.5" fill="#9B4DB8" opacity="0.40"/>
  <!-- Line 7 blank-ish -->
  <rect x="224" y="158" width="14" height="7" rx="3.5" fill="#7B2D8E" opacity="0.55"/>
  <!-- Line 8 -->
  <rect x="224" y="174" width="62" height="7" rx="3.5" fill="#B57DD0" opacity="0.30"/>
  <rect x="291" y="174" width="24" height="7" rx="3.5" fill="#9B4DB8" opacity="0.40"/>
  <!-- Line 9 -->
  <rect x="224" y="190" width="44" height="7" rx="3.5" fill="#7B2D8E" opacity="0.35"/>
  <!-- Line 10 -->
  <rect x="224" y="206" width="32" height="7" rx="3.5" fill="#9B4DB8" opacity="0.45"/>
  <rect x="261" y="206" width="48" height="7" rx="3.5" fill="#B57DD0" opacity="0.28"/>

  <!-- Logo circle -->
  <circle cx="135" cy="118" r="68" fill="url(#iconGrad)" filter="url(#shadow)"/>

  <!-- Magnifying glass body -->
  <circle cx="126" cy="110" r="26" fill="none" stroke="#ffffff" stroke-width="5.5"/>
  <!-- Magnifying glass handle -->
  <line x1="146" y1="130" x2="160" y2="144" stroke="#ffffff" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Code lines inside magnifying glass -->
  <line x1="112" y1="104" x2="132" y2="104" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" opacity="0.95"/>
  <line x1="112" y1="111" x2="138" y2="111" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" opacity="0.70"/>
  <line x1="112" y1="118" x2="127" y2="118" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" opacity="0.45"/>

  <!-- Extension name -->
  <text x="135" y="212"
        text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="700" fill="#5B1A6E" letter-spacing="0.5">
    QvsView.qs
  </text>

  <!-- Subtitle -->
  <text x="135" y="234"
        text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="11" font-weight="400" fill="#9B4DB8" letter-spacing="0.8" opacity="0.85">
    QLIK SCRIPT VIEWER
  </text>
</svg>
